services:
  # ---- Database ----
  postgres:
    image: postgres:16-alpine
    container_name: tm-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tm_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tm_secret_2024}
      POSTGRES_DB: ${POSTGRES_DB:-team_management}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tm_admin} -d ${POSTGRES_DB:-team_management}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Cache ----
  redis:
    image: redis:7-alpine
    container_name: tm-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---- Object Storage ----
  minio:
    image: minio/minio:latest
    container_name: tm-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---- Backend Application ----
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tm-server
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tm_admin}:${POSTGRES_PASSWORD:-tm_secret_2024}@postgres:5432/${POSTGRES_DB:-team_management}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-team-management}
      PORT: 3000
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ---- Frontend + Reverse Proxy ----
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: tm-nginx
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  uploads_data:
